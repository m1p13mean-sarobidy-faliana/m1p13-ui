<div class="flex min-h-screen font-sans">
  @if (!screen.isMobile()) {
  <aside class="w-64 border-r border-gray-800 flex flex-col p-6 space-y-8">
    <div class="flex items-center gap-3 px-2">
      <div class="bg-blue-600 p-2 rounded-lg">
        <i class="pi pi-th-large text-white"></i>
      </div>
      <div>
        <h1 class="font-bold text-lg leading-tight">AkoorHub</h1>
        <p class="text-xs text-gray-500">Centre commercial</p>
      </div>
    </div>

    <nav class="flex-1 space-y-2">
      @for (route of possibleRoutes; track $index) {
      <a
        [href]="route.url"
        class="flex items-center gap-3 p-3 rounded-xl {{currentUrl().startsWith(route.url) ? 'bg-blue-600/10':'' }}"
      >
        <i [class]="route.icon"></i> {{route.label}}
      </a>
      }
    </nav>

    <div
      class="flex items-center gap-3 p-2 mt-auto cursor-pointer"
      (click)="navigate('/profile')"
    >
      <p-avatar
        image="https://i.pravatar.cc/150?u=alex"
        shape="circle"
      ></p-avatar>
      <div class="text-sm">
        <p class="font-bold">{{loggedUser()?.first_name}}</p>
        <p class="text-gray-500 text-xs">
          {{authProvider.labeledRole[loggedUser()?.role!]}}
        </p>
      </div>
    </div>
    <p-button
      icon="pi pi-sign-out"
      label="Deconnexion"
      class="w-full"
      size="small"
      variant="outlined"
      (click)="authProvider.logout()"
    ></p-button>
  </aside>
  }

  <p-drawer
    [visible]="sidebarService.visible()"
    (onHide)="sidebarService.close()"
    (visibleChange)="sidebarService.visible.set($event)"
    [closable]="false"
  >
    <aside class="w-full h-full flex flex-col gap-5">
      <div class="flex items-center gap-3 px-2">
        <div class="bg-blue-600 p-2 rounded-lg">
          <i class="pi pi-th-large text-white"></i>
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight">ShopHub</h1>
          <p class="text-xs text-gray-500">Mall Management</p>
        </div>
      </div>

      <nav class="flex-1 space-y-2">
        <a
          href="#"
          class="flex items-center gap-3 p-3 bg-blue-600/10 text-blue-500 rounded-xl border-l-4 border-blue-600"
        >
          <i class="pi pi-objects-column"></i> Tableau de bord
        </a>
        <a
          href="#"
          class="flex items-center gap-3 p-3 text-gray-400 hover:text-white transition"
          ><i class="pi pi-shop"></i> Boutiques</a
        >
      </nav>

      <div class="flex items-center gap-3 p-2 mt-auto">
        <p-avatar
          image="https://i.pravatar.cc/150?u=alex"
          shape="circle"
        ></p-avatar>
        <div class="text-sm">
          <p class="font-bold">Alex Rivera</p>
          <p class="text-gray-500 text-xs">Super Admin</p>
        </div>
      </div>
    </aside>
  </p-drawer>

  <main class="flex-1 flex flex-col overflow-y-auto"></main>
</div>
