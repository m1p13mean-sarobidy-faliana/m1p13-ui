<div class="flex min-h-screen font-sans">
  @if (!screen.isMobile()) {
  <sidebar-content
    class="w-64 border-r border-gray-800 h-screen flex flex-col p-6 space-y-8"
  ></sidebar-content>
  }

  <p-drawer
    [visible]="sidebarService.visible()"
    (onHide)="sidebarService.close()"
    (visibleChange)="sidebarService.visible.set($event)"
    [closable]="false"
  >
    <sidebar-content
      class="w-full h-full flex flex-col gap-5"
    ></sidebar-content>
  </p-drawer>
</div>
