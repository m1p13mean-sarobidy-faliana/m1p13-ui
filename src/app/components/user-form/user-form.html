<div>
  <form [formGroup]="userForm" (submit)="submit()" class="flex flex-col gap-3">
    <div>
      <p-floatlabel variant="on">
        <input
          pInputText
          id="lastname"
          formControlName="last_name"
          autocomplete="off"
          [invalid]="zodErrors()['last_name']"
          class="w-full"
        />
        <label
          for="lastname"
          class="text-{{zodErrors()['last_name']?'text-red-400' : ''}}"
          >Nom</label
        >
      </p-floatlabel>
      @if (zodErrors()['last_name']) {
      <small id="last_name-helper" class="text-red-400"
        >{{ zodErrors()['last_name'] }}</small
      >
      }
    </div>
    <div>
      <p-floatlabel variant="on">
        <input
          pInputText
          id="firstname"
          formControlName="first_name"
          autocomplete="off"
          [invalid]="zodErrors()['first_name']"
          class="w-full text-{{zodErrors()['first_name']?'red' : ''}}"
        />
        <label
          for="firstname"
          class="text-{{zodErrors()['first_name']?'text-red-400' : ''}}"
          >Prénom</label
        >
      </p-floatlabel>
      @if (zodErrors()['first_name']) {
      <small id="first_name-helper" class="text-red-400"
        >{{ zodErrors()['first_name'] }}</small
      >
      }
    </div>

    <div>
      <p-floatlabel variant="on">
        <input
          pInputText
          type="email"
          id="email"
          formControlName="email"
          autocomplete="off"
          aria-describedby="email-helper"
          [invalid]="zodErrors()['email']"
          class="w-full"
        />
        <label for="email" class="text-{{zodErrors()['email']?'red' : ''}}"
          >Email</label
        >
      </p-floatlabel>
      @if (zodErrors()['email']) {
      <small id="email-helper" class="text-red-400"
        >{{ zodErrors()['email'] }}</small
      >
      }
    </div>
    <div>
      <p-floatlabel variant="on">
        <input
          pInputText
          pInputMask="999 99 999 99"
          id="phone"
          formControlName="phone"
          autocomplete="off"
          [invalid]="zodErrors()['phone']"
          class="w-full"
        />
        <label for="phone" class="{{zodErrors()['phone']?'text-red-400' : ''}}"
          >N° Téléphone</label
        >
      </p-floatlabel>
      @if (zodErrors()['phone']) {
      <small id="phone-helper" class="text-red-400"
        >{{ zodErrors()['phone'] }}</small
      >
      }
    </div>
    <p-button
      type="submit"
      label="Enregistrer"
      [raised]="true"
      styleClass="mb-4 w-full"
    />
  </form>
</div>
