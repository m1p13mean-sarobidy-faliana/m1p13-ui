<p-card class="max-w-sm">
  <p-image
    [src]="'https://primefaces.org/cdn/primeng/images/demo/product/bamboo-watch.jpg'"
    imageClass="w-full rounded"
  />
  <div class="pt-6">
    <div class="flex flex-row justify-between products-start gap-2">
      <div>
          <a href="#" class="font-medium  hover:underline text-red-400 text-sm"
            >{{item.shop.name}}</a
          >
        <div class="text-2xl font-medium mt-1">{{item.name}}</div>
      </div>
    </div>
    <div class="flex flex-col gap-6 mt-6">
      <div class="flex gap-2">
        <button
          pButton
          icon="pi pi-shopping-cart"
          [label]="'Acheter | '+item.unit_price"
          class="flex-auto whitespace-nowrap"
        ></button>
      </div>
    </div>
  </div>
</p-card>
