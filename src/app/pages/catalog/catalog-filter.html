<div
  class="w-full max-w-3xl bg-white shadow-lg rounded-2xl p-6 space-y-6 border border-gray-100"
>
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-900">Filtres</h2>
    <button class="text-blue-600 hover:text-blue-800 text-sm font-medium">
      Restorer
    </button>
  </div>

  <div>
    <div class="flex gap-2 mb-4 mt-5 items-center">
      <i class="pi pi-dollar"></i>
      <label class="block text-sm font-medium text-gray-700">Prix</label>
    </div>
    <p-slider
      [(ngModel)]="priceValue"
      [range]="true"
      [min]="0"
      [step]="10"
      class="w-full"
    >
    </p-slider>
    <div class="flex justify-between text-xs text-gray-500 mt-2">
      <span>Min Ar {{ priceValue[0] }}</span>
      <span>Max Ar {{ priceValue[1] }}</span>
    </div>
  </div>

  <div>
    <div class="flex gap-2 mb-4 mt-10 items-center">
      <i class="pi pi-objects-column"></i>
      <label class="block text-sm font-medium text-gray-700">Cactegories</label>
    </div>
    <p-listbox
      [options]="categories"
      [(ngModel)]="selectedCategory"
      optionLabel="label"
      [multiple]="true"
      [checkbox]="true"
      [showToggleAll]="false"
      class="w-full"
    />
  </div>

  <div>
    <div class="flex gap-2 mb-4 mt-10 items-center">
      <i class="pi pi-shop"></i>
      <label class="block text-sm font-medium text-gray-700">Boutique</label>
    </div>
    <p-autocomplete
      [(ngModel)]="selectedCategory"
      [suggestions]="suggestions"
      [multiple]="true"
      field="label"
      fluid
      (completeMethod)="search($event)"
    />
  </div>

  <div class="flex flex-wrap gap-2">
    @for (shop of shopChips; track $index) {
    <p-chip
      [label]="shop.label"
      [removable]="true"
      (onRemove)="removeChip(shop)"
    >
    </p-chip>
    }
  </div>

  <div class="flex space-x-3 pt-4">
    <p-button label="Appliquer" (onClick)="applyFilters()" class="flex-1">
    </p-button>
  </div>
</div>
