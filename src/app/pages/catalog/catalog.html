<div class="p-5 relative">
  <div class="flex items-center justify-center w-full">
    <p-iconfield class="mb-4 w-5xl">
      <p-inputicon class="pi pi-search" />
      <input type="text" pInputText placeholder="Recherche" class="w-full" />
      <p-inputicon
        class="pi pi-sliders-h cursor-pointer"
        (click)="op.toggle($event)"
      />
    </p-iconfield>
  </div>
  <p-popover #op [unstyled]="true">
    <catalog-filter></catalog-filter>
  </p-popover>
  <p-dataview #dv [value]="catalogs" [rows]="20" [paginator]="true">
    <ng-template #list let-items>
      <div class="grid grid-cols-5 gap-4 mb-6">
        @for (item of items; track $index) {
        <catalog-item [item]="item"></catalog-item>
        }
      </div>
    </ng-template>
  </p-dataview>
</div>
